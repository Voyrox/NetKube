apiVersion: v1
kind: Namespace
metadata:
  name: netkube
---
apiVersion: v1
kind: Secret
metadata:
  name: netkube-auth
  namespace: netkube
type: Opaque
stringData:
  EMAIL: admin@example.com
  PASSWORD: change-me
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: netkube-config
  namespace: netkube
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netkube
  namespace: netkube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netkube
  template:
    metadata:
      labels:
        app: netkube
    spec:
      containers:
        - name: netkube
          image: glitchedking/netkube:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: netkube-auth
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: netkube-config
---
apiVersion: v1
kind: Service
metadata:
  name: netkube
  namespace: netkube
spec:
  type: NodePort
  selector:
    app: netkube
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30080
