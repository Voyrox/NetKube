apiVersion: apps/v1
kind: Deployment
metadata:
  name: netkube
  namespace: netkube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netkube
  template:
    metadata:
      labels:
        app: netkube
    spec:
      containers:
        - name: netkube
          image: netkube:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: netkube-config
